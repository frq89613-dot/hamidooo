<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>SwebTools — Next-Gen AI Automation & Digital Solutions</title>
    <meta name="description" content="SwebTools is a next-generation AI Automation & Digital Solutions agency. We build autonomous business systems powered by AI Agents, n8n workflows, and high-performance web development." />
    <meta name="keywords" content="AI automation, n8n, workflow automation, AI agents, web development, SEO, e-commerce AI, SwebTools" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="SwebTools" />
    <meta name="theme-color" content="#00FF88" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://swebtools.com/" />
    <meta property="og:title" content="SwebTools — Next-Gen AI Automation" />
    <meta property="og:description" content="We design, build, and deploy intelligent automation systems that run your business 24/7. Replace manual operations with precision AI agents." />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_SA" />
    <meta property="og:locale:alternate" content="tr_TR" />
    <meta property="og:locale:alternate" content="ru_RU" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@swebtools" />
    <meta name="twitter:title" content="SwebTools — Next-Gen AI Automation" />
    <meta name="twitter:description" content="We design, build, and deploy intelligent automation systems that run your business 24/7." />
    <meta name="twitter:image" content="/opengraph.jpg" />

    <!-- hreflang for multilingual SEO -->
    <link rel="alternate" hreflang="en" href="https://swebtools.com/en" />
    <link rel="alternate" hreflang="ar" href="https://swebtools.com/ar" />
    <link rel="alternate" hreflang="tr" href="https://swebtools.com/tr" />
    <link rel="alternate" hreflang="ru" href="https://swebtools.com/ru" />
    <link rel="alternate" hreflang="x-default" href="https://swebtools.com/" />

    <!-- Canonical -->
    <link rel="canonical" href="https://swebtools.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Space Grotesk + JetBrains Mono + Noto Kufi Arabic (RTL) -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SwebTools",
      "url": "https://swebtools.com",
      "logo": "https://swebtools.com/favicon.svg",
      "description": "Next-generation AI Automation & Digital Solutions agency. We build autonomous business systems powered by AI Agents.",
      "foundingDate": "2024",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@swebtools.com",
        "contactType": "customer service"
      },
      "sameAs": [],
      "serviceArea": {
        "@type": "Place",
        "name": "Global"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "AI Automation Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "AI E-commerce Agents",
              "description": "Intelligent customer service and dynamic product recommendations powered by AI."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Workflow Automation (n8n)",
              "description": "Complex pipeline architectures connecting all your business tools into a unified autonomous system."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "High-Performance Web Development",
              "description": "Next.js and Tailwind applications optimized for maximum speed and SEO."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "AI-Enhanced SEO",
              "description": "AI-driven data analysis for ranking optimization and programmatic content improvement."
            }
          }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
