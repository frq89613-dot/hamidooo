server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:css|js|jpg|jpeg|png|svg|ico|webp|avif|json)$ {
    try_files $uri =404;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /robots.txt {
    try_files $uri =404;
  }

  location = /sitemap.xml {
    try_files $uri =404;
  }
}
